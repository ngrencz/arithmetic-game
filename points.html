<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speed Game Leaderboards</title>
  <link rel="stylesheet" href="style.css">
  <style>
      /* Layout Structuring */
      .top-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
      .pb-card { flex: 2; background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; min-width: 300px; }
      .redeem-card { flex: 1; background: #f8fafc; padding: 25px; border-radius: 12px; border: 2px dashed #cbd5e1; min-width: 250px; display: flex; flex-direction: column; justify-content: center;}
      
      .lb-card { background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; }
      
      /* Evenly Spaced Game Selection Menu */
      .menu-bar { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
      .menu-bar button { flex: 1; min-width: 120px; background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
      .menu-bar button:hover { background: #e2e8f0; }
      .menu-bar button.active { background: #3b82f6; color: white; border-color: #2563eb; }
      
      /* Opposite-Side Leaderboard Controls */
      .lb-controls { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 15px; }
      .control-group { display: flex; gap: 10px; }
      .toggle-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #cbd5e1; background: white; color: #64748b; font-size: 0.85rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
      .toggle-btn:hover { background: #f1f5f9; }
      .toggle-btn.active { background: #10b981; color: white; border-color: #059669; }
      
      /* Tables & Stats */
      .leaderboard-table { width: 100%; border-collapse: collapse; }
      .leaderboard-table th, .leaderboard-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }
      .leaderboard-table th { color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
      
      .pb-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin-top: 20px; }
      .pb-item { background: #f8fafc; padding: 15px 10px; border-radius: 8px; text-align: center; border: 1px solid #e2e8f0; }
      .pb-val { font-size: 1.8rem; font-weight: bold; color: #10b981; margin-top: 5px; }
  </style>
</head>
<body>

  <div id="header">
      <div class="header-left">
          <span class="lesson-pill" style="background: #3b82f6;">Leaderboards & Rewards</span>
      </div>
      <div class="header-right">
          <a href="index.html" style="color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px;">⬅ Back to Game</a>
      </div>
  </div>

  <main class="container">
      <div style="width: 100%; max-width: 1000px; margin: 0 auto;">
          
          <div class="top-row">
              <div class="pb-card" id="user-info">
                  <h3 style="color:#64748b; text-align:center;">Loading your stats...</h3>
              </div>

              <div class="redeem-card" id="redeem-box">
                  <h3 style="margin: 0 0 15px 0; color: #1e293b; text-align: center;">🏆 Prize Redemption</h3>
                  <div style="display: flex; flex-direction: column; gap: 10px;">
                      <label style="color: #64748b; font-weight: bold; font-size: 0.9rem;">
                          Points to spend:
                          <input type="number" id="redeem-amount" class="math-input" min="1" value="1" style="width: 100%; margin-top: 8px; font-size: 1.2rem; padding: 10px;" />
                      </label>
                      <button id="redeem-btn" class="primary-btn" style="background: #10b981; width: 100%; margin-top: 5px;">Redeem Now</button>
                      <div id="redeem-message" style="margin-top:0.5em; text-align: center; font-weight: bold;"></div>
                  </div>
              </div>
          </div>

          <div class="lb-card" id="leaderboard-window">
              <div class="menu-bar" id="menu-bar"></div>
              <div id="leaderboard-content"></div>
          </div>

      </div>
  </main>

  <script type="module" src="points.js"></script>
</body>
</html>
