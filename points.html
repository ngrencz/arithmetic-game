<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grinch Leaderboards</title>
  <link rel="stylesheet" href="style.css">
  <style>
      /* Minor inline tweaks for the leaderboard tables to match the new style */
      .menu-bar button, .submenu-bar button {
          background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; 
          padding: 8px 15px; border-radius: 6px; margin: 0 5px 10px 0; cursor: pointer; font-weight: bold;
      }
      .menu-bar button.active, .submenu-bar button.active {
          background: #10b981; color: white; border-color: #059669; /* Grinch green active state */
      }
      .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
      .leaderboard-table th, .leaderboard-table td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
      .leaderboard-table th { background: #f8fafc; color: #1e293b; }
  </style>
</head>
<body>

  <div id="header">
      <div class="header-left">
          <span class="lesson-pill" style="background: #10b981;">Grinch Leaderboards</span>
      </div>
      <div class="header-right">
          <a href="index.html" style="color: white; text-decoration: none; font-weight: bold;">⬅ Back to Game</a>
      </div>
  </div>

  <main class="container">
      <div class="card" style="padding: 30px;">
          
          <div id="user-info" style="border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 20px;"></div>
          
          <div style="display: flex; gap: 30px; flex-wrap: wrap;">
              
              <div id="leaderboard-window" style="flex: 2; min-width: 300px;">
                  <div class="menu-bar" id="menu-bar"></div>
                  <div class="submenu-bar" id="submenu-bar"></div>
                  <div id="leaderboard-content"></div>
              </div>

              <div id="redeem-box" style="flex: 1; min-width: 250px; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; height: fit-content;">
                  <h3 style="margin-top: 0; color: #1e293b;">🎁 Redeem Points</h3>
                  <div style="display: flex; flex-direction: column; gap: 10px;">
                      <label style="color: #64748b; font-weight: bold;">
                          Points to redeem:
                          <input type="number" id="redeem-amount" class="math-input" min="1" value="1" style="width: 100%; margin-top: 5px; font-size: 1.2rem; padding: 8px;" />
                      </label>
                      <button id="redeem-btn" class="primary-btn" style="background: #10b981;">Redeem Prize</button>
                      <div id="redeem-message" style="margin-top:0.5em; text-align: center;"></div>
                      <div class="redeem-caption" style="font-size: 0.85rem; color: #94a3b8; text-align: center;">Redeem this many points for prizes</div>
                  </div>
              </div>

          </div>
      </div>
  </main>

  <script type="module" src="points.js"></script>
</body>
</html>
